server {
    listen 80;
    server_name localhost;

    # Gốc chứa source code đã build
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # PHẦN QUAN TRỌNG: Nếu không tìm thấy file, hãy trả về index.html
        try_files $uri $uri/ /index.html;
    }

    # Bảo mật: Chặn truy cập vào các file ẩn (như .htaccess)
    location ~ /\. {
        deny all;
    }

    # Tùy chọn: Cấu hình cache cho static files để tăng tốc độ
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Quản lý trang lỗi
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}