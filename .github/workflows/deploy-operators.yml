name: "Ops - Install External Secrets Operator (ESO) on EKS Helm Chart"

on:
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công từ tab Actions

jobs:
  install-eso:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Bắt buộc để dùng OIDC
      contents: read  # Bắt buộc để checkout code
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name devsecops-eks-cluster

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          # Cài đặt hoặc cập nhật ESO
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            -f helm/eso/values.yaml # Sử dụng file cấu hình bạn vừa tạo