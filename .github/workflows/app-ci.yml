name: "App CI - Build & Security Scan"

on:
  workflow_dispatch: 
  push:
    paths:
      - 'Fullstack-Ecommerce-Web/**' # Chạy khi có bất kỳ thay đổi nào trong thư mục app

jobs:
  # ================= NEW: SAST ANALYSIS =================
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build Backend trước để Sonar có file .class phân tích sâu hơn
      - name: Build Backend Classes
        run: |
          cd Fullstack-Ecommerce-Web/02-backend
          mvn clean compile 

      # QUÉT MỘT LẦN DUY NHẤT CHO CẢ HAI
      - name: SonarCloud Unified Scan
        uses: SonarSource/sonarcloud-github-action@v2 # Sử dụng phiên bản cụ thể thay vì @master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Fullstack-Ecommerce-Web
          # Nó sẽ tự động đọc file sonar-project.properties chúng ta vừa tạo
  # ================= J1: BACKEND CI =================
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest \
          -f ./Fullstack-Ecommerce-Web/02-backend/Dockerfile \
          ./Fullstack-Ecommerce-Web/02-backend

      - name: Run Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to Docker Hub
        if: success()
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest

  # ================= J2: FRONTEND CI =================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest \
          -f ./Fullstack-Ecommerce-Web/03-frontend/Dockerfile \
          ./Fullstack-Ecommerce-Web/03-frontend

      - name: Run Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend to Docker Hub
        if: success()
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest