name: "App CI - Build & Security Scan"

on:
  push:
    paths:
      - 'Fullstack-Ecommerce-Web/**' # Chạy khi có code app thay đổi

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build Image tạm để Scan
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest -f ./Fullstack-Ecommerce-Web/02-backend/Dockerfile ./Fullstack-Ecommerce-Web/02-backend

      # 2. TRIVY SCAN: Chặn Pipeline nếu phát hiện lỗ hổng CRITICAL
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest'
          format: 'table'
          exit-code: '1' # Làm tạch pipeline nếu thấy lỗi nặng
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 3. Chỉ Push khi Image đã "Sạch"
      - name: Push to Docker Hub
        if: success()
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest