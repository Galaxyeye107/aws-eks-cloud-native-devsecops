name: "Install Monitoring Stack"

on:
  workflow_dispatch: # Chạy thủ công
  push:
    paths:
      - 'helm/prometheus-grafana/**' # Tự động chạy khi sửa cấu hình monitoring

jobs:
  install-monitoring:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name devsecops-eks-cluster

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy Monitoring Stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f helm/prometheus-grafana/values.yaml

      - name: Deploy Logging Stack (Loki & Promtail)
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install loki grafana/loki-stack \
            --namespace monitoring \
            --set loki.persistence.enabled=false \
            -f helm/loki/values.yaml
    
      - name: Deploy Tracing Stack (Jaeger)
        run: |
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
          helm repo update
          helm upgrade --install jaeger jaegertracing/jaeger \
            --namespace monitoring \
            -f helm/jaeger/values.yaml