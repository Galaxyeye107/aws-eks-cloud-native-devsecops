name: "Infrastructure - Destroy"

on:
  workflow_dispatch: # Chỉ chạy khi bạn nhấn nút bằng tay

permissions:
  id-token: write
  contents: read

jobs:
  destroy-vpc:
    runs-on: ubuntu-latest
    env:
      TF_STATE_BUCKET: "trung-devsecops-eks-tfstate-prod" # Thay tên bucket của bạn
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Destroy
        run: |
          cd terraform/vpc
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=devsecops-tf-locks"
          terraform destroy -auto-approve