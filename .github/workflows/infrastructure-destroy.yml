name: "Infrastructure - Destroy"

on:
  workflow_dispatch: # chỉ chạy khi bấm tay

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_STATE_BUCKET: trung-devsecops-eks-tfstate-prod
  TF_LOCK_TABLE: devsecops-tf-locks

jobs:

  destroy-eks:
    name: Destroy EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy EKS
        run: |
          cd terraform/eks
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

          terraform destroy -auto-approve


  destroy-vpc:
    name: Destroy VPC
    runs-on: ubuntu-latest
    needs: destroy-eks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy VPC
        run: |
          cd terraform/vpc
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

          terraform destroy -auto-approve