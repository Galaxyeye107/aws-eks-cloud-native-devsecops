name: "Infrastructure - Destroy"

on:
  workflow_dispatch: # Chỉ chạy khi bấm tay

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_STATE_BUCKET: trung-devsecops-eks-tfstate-prod
  TF_LOCK_TABLE: devsecops-tf-locks
  CLUSTER_NAME: devsecops-eks-cluster # Đặt tên cluster vào biến môi trường cho dễ dùng

jobs:
  destroy-eks:
    name: Destroy EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      # --- BƯỚC QUAN TRỌNG: XÓA INGRESS TRƯỚC ---
      - name: Configure Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Delete Kubernetes Ingress
        run: |
          # Xóa tất cả ingress trong tất cả namespace
          kubectl delete ingress --all --all-namespaces || true
          
          # Đợi 2 phút để AWS có thời gian xóa bỏ Load Balancer thực tế
          echo "Waiting 120s for AWS Load Balancer to be fully deleted..."
          sleep 120 
      # ------------------------------------------

      - name: Cleanup Application, Network Policy & EBS Volumes
        run: |
          echo "1. Đang xóa Network Policy"
          kubectl delete networkpolicy --all --all-namespaces || true

          echo "2. Đang giải phóng toàn bộ PVC và PV để AWS xóa EBS Volumes..."
          # Xóa PVC trước để kích hoạt lệnh xóa EBS trên AWS
          kubectl delete pvc --all --all-namespaces || true
          # Xóa PV (nếu chúng còn sót lại)
          kubectl delete pv --all || true
          sleep 30 # Đợi 30s để AWS nhận lệnh xóa EBS và giải phóng tài nguyên

          echo "3. Đang xóa các ứng dụng chính (Frontend, Backend, MySQL)..."
          kubectl delete statefulset --all -n default || true
          kubectl delete deployment --all -n default || true
          kubectl delete svc --all -n default || true

          echo "4. Force xóa finalizers nếu còn sót (Phòng hờ bị kẹt)"
          kubectl get pvc --all-namespaces -o json | jq '.items[] | select(.metadata.deletionTimestamp != null) | .metadata.name' | xargs -I {} kubectl patch pvc {} -p '{"metadata":{"finalizers":null}}' --type=merge || true

          echo "5. Delete StorageClass ebs-sc..."
          kubectl delete sc ebs-sc || true
          sleep 30

          echo "6. Đang xóa Managed Addon VPC-CNI (Để tránh kẹt Cluster)..."
          # Bước này rất quan trọng vì mình đã dùng lệnh create-addon thủ công
          aws eks delete-addon --cluster-name ${{ env.CLUSTER_NAME }} --addon-name vpc-cni || true
          
          echo "7. Chờ 30s để hệ thống ổn định trước khi chạy Terraform..."
          sleep 30
      # ---  DỌN DẸP MONITORING VÀ PVCs ---
      - name: Cleanup Monitoring, Logging & Tracing
        run: |
          echo "1. Gỡ cài đặt các Helm Chart..."
          helm uninstall kube-prometheus-stack -n monitoring || true
          helm uninstall loki -n monitoring || true
          helm uninstall jaeger -n monitoring || true

          echo "2. Xóa các Service LoadBalancer (Để giải phóng AWS ALB/NLB)..."
          # Chúng ta cần xóa SVC trước để AWS gỡ mapping ở tầng Cloud
          kubectl delete svc --all -n monitoring || true

          echo "3. Xóa PVCs để giải phóng ổ đĩa EBS..."
          kubectl delete pvc --all -n monitoring || true

          echo "4. Xóa Namespace (Không chờ đợi)..."
          kubectl delete namespace monitoring --wait=false || true

          echo "5. Chờ 60s để tài nguyên Cloud (ALB/EBS) được giải phóng..."
          sleep 60

          # KIỂM TRA: Nếu namespace vẫn còn (bị kẹt Terminating), xử dụng Finalizer
          if kubectl get namespace monitoring; then
            echo "Phát hiện Namespace bị kẹt, đang thực hiện Force Cleanup..."
            kubectl get namespace monitoring -o json \
            | jq '.spec.finalizers = []' \
            | kubectl replace --raw "/api/v1/namespaces/monitoring/finalize" -f - || true
          fi

          echo "Cleanup hoàn tất sạch sẽ!"

      - name: Terraform Destroy EKS
        run: |
          cd terraform/eks
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

          terraform destroy -auto-approve

  destroy-vpc:
    name: Destroy VPC
    runs-on: ubuntu-latest
    needs: destroy-eks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy VPC
        run: |
          cd terraform/vpc
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=vpc/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

          terraform destroy -auto-approve