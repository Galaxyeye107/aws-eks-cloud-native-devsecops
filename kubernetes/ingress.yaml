apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Cấu hình Health Check để ALB không đánh dấu Pod là "Unhealthy"
    alb.ingress.kubernetes.io/healthcheck-path: /api/products
    alb.ingress.kubernetes.io/healthcheck-port: '8080'
spec:
  ingressClassName: alb # Khắc phục lỗi CLASS <none>
  rules:
    - host: api-ecommerce.devopsedu.vn  # <--- THÊM DÒNG NÀY
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-backend-service
                port:
                  number: 80
    - host: ecommerce.devopsedu.vn      # (Tùy chọn) Domain cho Frontend
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-frontend-service
                port:
                  number: 80