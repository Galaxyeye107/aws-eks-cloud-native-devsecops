loki:
  persistence:
    enabled: false # Không dùng volume ngoài để tiết kiệm
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi
  datasource:
    jsonData: "{}"
    isDefault: false # PHẢI ĐỂ LÀ FALSE

promtail:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push # Gửi log về service loki
  